name: Codex checks

on:
  pull_request:
    paths:
      - "index.html"
      - "static/**"
      - "data/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "environment.yml"
      - ".github/workflows/**"
      - "README.md"
  push:
    branches: ["main"]
    paths:
      - "index.html"
      - "static/**"
      - "data/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "environment.yml"
      - ".github/workflows/**"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run smoke test
        run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip beautifulsoup4 numpy pandas pillow requests selenium

      - name: Run site build
        run: python scripts/build_site.py --skip-patch-history
